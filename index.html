<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YF Finance</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div id="root"></div>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.body.style.background = '#08090d';
      document.body.innerHTML = '<div style="padding:40px;font-family:monospace;color:#f04f6e"><h2 style="color:#05d49b">YFFinance — JS Error</h2><pre style="white-space:pre-wrap;font-size:12px">' + msg + '\n' + src + ':' + line + '\n' + (err && err.stack || '') + '</pre></div>';
    };
    window.addEventListener('unhandledrejection', function(e) {
      document.body.style.background = '#08090d';
      document.body.innerHTML = '<div style="padding:40px;font-family:monospace;color:#f04f6e"><h2 style="color:#05d49b">YFFinance — Unhandled Promise</h2><pre style="white-space:pre-wrap;font-size:12px">' + (e.reason && (e.reason.stack || e.reason.message || e.reason)) + '</pre></div>';
    });
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
